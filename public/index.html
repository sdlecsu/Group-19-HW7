<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>To-Do Lists — Group 19 HW7</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>To-Do Lists</h1>
      <p class="tagline">Create lists, add tasks, and mark them complete.</p>
    </header>

    <main class="layout">
      <section class="panel lists-panel" aria-labelledby="lists-heading">
        <h2 id="lists-heading">Your lists</h2>
        <form id="new-list-form" class="inline-form" autocomplete="off">
          <label for="new-list-title" class="sr-only">New list title</label>
          <input
            type="text"
            id="new-list-title"
            name="title"
            placeholder="New list title"
            required
            maxlength="200"
          />
          <button type="submit">Add list</button>
        </form>
        <ul id="list-titles" class="list-titles"></ul>
      </section>

      <section class="panel detail-panel" aria-labelledby="detail-heading">
        <div id="detail-empty" class="detail-empty">
          <p>Select a list or create one to get started.</p>
        </div>
        <div id="detail-content" class="detail-content hidden">
          <div class="detail-header">
            <h2 id="detail-heading"></h2>
            <button type="button" id="delete-list-btn" class="btn-danger">Delete list</button>
          </div>
          <form id="new-entry-form" class="inline-form" autocomplete="off">
            <label for="new-entry-text" class="sr-only">New task text</label>
            <input
              type="text"
              id="new-entry-text"
              name="text"
              placeholder="Add a task"
              required
              maxlength="2000"
            />
            <button type="submit">Add task</button>
          </form>
          <ul id="entries-list" class="entries-list"></ul>
        </div>
      </section>
    </main>

    <script src="/js/app.js" defer></script>
  </body>
</html>
